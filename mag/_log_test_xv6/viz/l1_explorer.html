  <script>
  (function () {
    const MAG = JSON.parse(document.getElementById('MAG_DATA').textContent);
    const nodes = new vis.DataSet(MAG.nodes);
    const edges = new vis.DataSet(MAG.edges);
    const kinds = [...new Set(MAG.nodes.map(n => n.group))].sort();
    const rng = (s) => { let h = 0; for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0; return Math.abs(h); };
    const groups = {};
    kinds.forEach(function (k, i) {
      const hue = (rng(k) + i * 17) % 360;
      groups[k] = {
        color: { background: 'hsl(' + hue + ',65%,88%)', border: 'hsl(' + hue + ',50%,35%)',
          highlight: { background: '#fff', border: '#000' } },
        font: { color: '#111', size: 11 }
      };
    });
    const container = document.getElementById('net');
    const options = {
      groups: groups,
      nodes: { shape: 'box', margin: 8, font: { multi: true } },
      edges: { arrows: 'to', smooth: false, font: { size: 9, strokeWidth: 0, color: '#444' } },
      physics: {
        enabled: true,
        solver: 'barnesHut',
        barnesHut: {
          gravitationalConstant: -12000,
          centralGravity: 0.15,
          springLength: 140,
          springConstant: 0.02,
          damping: 0.5,
          avoidOverlap: 0.2
        },
        stabilization: { iterations: 150, updateInterval: 30, fit: true }
      },
      interaction: { hover: true, navigationButtons: true, keyboard: { enabled: true }, tooltipDelay: 100 }
    };
    const net = new vis.Network(container, { nodes, edges }, options);
    document.getElementById('btnStop').onclick = () => net.setOptions({ physics: { enabled: false } });
    document.getElementById('btnStart').onclick = () => net.setOptions({ physics: { enabled: true } });
    document.getElementById('btnFit').onclick = () => net.fit({ animation: { duration: 400 } });
    net.once('stabilizationIterationsDone', function () {
      net.setOptions({ physics: { enabled: false } });
    });
  })();
  </script>
